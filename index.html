<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus Blocker</title>
  </head>
  <body>
    <h1>Focus Blocker</h1>
    <div style="text-align: right; margin-bottom: 12px;">
      <button id="settingsBtn" type="button" style="font-size: 12px; padding: 4px 8px;">Settings</button>
    </div>
    <div class="row">
      <div>
        <div>Focus mode</div>
        <div class="status" id="statusText">Loading state…</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="enabledToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <label>
      <div class="row" style="margin-bottom: 6px">
        <span>Blocked domains</span>
        <span class="pill">add one at a time</span>
      </div>
      <div class="row" style="gap: 8px; margin-bottom: 8px;">
        <input
          id="domainInput"
          type="text"
          placeholder="twitter.com"
          style="flex: 1; border-radius: 10px; border: 1px solid #1f2937; background: #020617; color: #e5e7eb; padding: 8px 9px;"
        />
        <button id="addBtn" type="button">Add</button>
      </div>
      <small>Enter one domain and click Add. Use x to remove an item.</small>
    </label>

    <ul id="domainList" style="margin-top: 8px; padding: 0; list-style: none; gap: 6px; display: flex; flex-direction: column;"></ul>

    <script src="src/popup.ts" type="module"></script>
  </body>
  </html>
