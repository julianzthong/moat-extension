<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus Blocker</title>
  </head>
  <body>
    <h1>Focus Blocker</h1>
    <div class="row">
      <div>
        <div>Focus mode</div>
        <div class="status" id="statusText">Loading state…</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="enabledToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <label>
      <div class="row" style="margin-bottom: 6px">
        <span>Blocked domains</span>
        <span class="pill">one per line</span>
      </div>
      <textarea
        id="domainsInput"
        placeholder="twitter.com
reddit.com
youtube.com"
      ></textarea>
      <small>Changes apply when you hit Save and only while focus mode is on.</small>
    </label>

    <button id="saveBtn">Save</button>

    <script src="src/popup.ts" type="module"></script>
  </body>
  </html>
